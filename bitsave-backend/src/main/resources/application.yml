# --- SERVER CONFIGURATION ---
server:
  port: 8080
  max-http-request-header-size: 8KB
  tomcat:
    max-http-form-post-size: 2MB
    connection-timeout: 5000

# --- SPRING CORE CONFIGURATION ---
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

  # Database Configuration (Fully managed via .env)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jwt_security}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    # PERFORMANCE: Connection Pooling with HikariCP
    hikari:
      connection-timeout: 20000      # Time in ms to wait for a free connection
      maximum-pool-size: 15          # Max parallel database connections
      idle-timeout: 300000           # Time before unused connections are closed

  # JPA / Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: true           
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Mail Configuration (SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:placeholder}
    password: ${MAIL_PASSWORD:placeholder} # 16-digit Google App Password recommended
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  web:
    error:
      include-message: never
      include-stacktrace: never
      include-exception: false

# --- SECURITY & JWT ---
jwt:
  # IMPORTANT: Always override this key in production using your .env file
  SECRET_KEY: ${JWT_SECRET_KEY:cc8d022f337520cb0e9d7f8273958e80d33819efaae4ea7178188559b785c0dd}

# --- CUSTOM APP SETTINGS ---
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost,http://localhost:4200}
  api-key: ${BITSAVE_API_KEY:your-secret-api-key}
