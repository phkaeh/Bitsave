<div class="flex flex-col gap-4">
      <hlm-dialog-header>
        <h3 hlmDialogTitle>Passwort Generator</h3>
        <p hlmDialogDescription class="text-muted-foreground">
          Generiere ein sicheres Passwort
        </p>
      </hlm-dialog-header>

      <div class="flex flex-col gap-4 py-4">
        <div class="relative">
          <input 
            hlmInput 
            [value]="generatedPassword()" 
            readonly
            class="pr-20 font-mono text-base"
          />
          <div class="absolute right-2 top-1/2 -translate-y-1/2 flex gap-1">
            <button
              type="button"
              hlmBtn
              variant="ghost"
              size="sm"
              (click)="regeneratePassword()"
              class="h-8 w-8 p-0"
            >
              <ng-icon name="lucideRefreshCw" size="16" />
            </button>
            <button
              type="button"
              hlmBtn
              variant="ghost"
              size="sm"
              (click)="copyToClipboard()"
              class="h-8 w-8 p-0"
            >
              <ng-icon [name]="copied() ? 'lucideCheck' : 'lucideCopy'" size="16" />
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <label hlmLabel>Länge</label>
            <span class="text-sm font-medium">{{ length }}</span>
          </div>
          <input 
            type="range" 
            min="8" 
            max="64" 
            [(ngModel)]="length"
            (ngModelChange)="regeneratePassword()"
            class="w-full h-2 bg-muted rounded-lg appearance-none cursor-pointer"
          />
        </div>

        <div class="flex flex-col gap-3">
          <label class="flex items-center justify-between cursor-pointer">
            <span class="text-sm">A-Z</span>
            <input 
              type="checkbox" 
              [(ngModel)]="includeUppercase"
              (ngModelChange)="regeneratePassword()"
              class="w-4 h-4 rounded"
            />
          </label>

          <label class="flex items-center justify-between cursor-pointer">
            <span class="text-sm">a-z</span>
            <input 
              type="checkbox" 
              [(ngModel)]="includeLowercase"
              (ngModelChange)="regeneratePassword()"
              class="w-4 h-4 rounded"
            />
          </label>

          <label class="flex items-center justify-between cursor-pointer">
            <span class="text-sm">0-9</span>
            <input 
              type="checkbox" 
              [(ngModel)]="includeNumbers"
              (ngModelChange)="regeneratePassword()"
              class="w-4 h-4 rounded"
            />
          </label>

          <label class="flex items-center justify-between cursor-pointer">
            <span class="text-sm">!@#$%^&*</span>
            <input 
              type="checkbox" 
              [(ngModel)]="includeSpecial"
              (ngModelChange)="regeneratePassword()"
              class="w-4 h-4 rounded"
            />
          </label>
        </div>

        <div class="flex items-center justify-between">
          <label hlmLabel>Minimum Zahlen</label>
          <input 
            hlmInput
            type="number" 
            min="0"
            [(ngModel)]="minNumbers"
            (blur)="onMinNumbersBlur()"
            class="w-20 text-center"
          />
        </div>

        <div class="flex items-center justify-between">
          <label hlmLabel>Minimum Sonderzeichen</label>
          <input 
            hlmInput
            type="number" 
            min="0"
            [(ngModel)]="minSpecial"
            (blur)="onMinSpecialBlur()"
            class="w-20 text-center"
          />
        </div>
      </div>

      <hlm-dialog-footer class="gap-2">
        <button hlmBtn variant="outline" (click)="close()">
          Abbrechen
        </button>
        <button hlmBtn (click)="selectPassword()">
          Auswählen
        </button>
      </hlm-dialog-footer>
    </div>
