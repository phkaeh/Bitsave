<div class="flex items-start justify-center min-h-screen bg-background pt-20">
  <section hlmCard class="border border-border w-full max-w-md">
    <div hlmCardHeader>
      <h2 hlmCardTitle class="text-center">Konto erstellen</h2>
    </div>
    <div hlmCardContent>
      <form class="flex flex-col gap-4" #f="ngForm" (ngSubmit)="onSubmit(f)">
        
        <div class="flex flex-col gap-2">
          <label hlmLabel for="firstName">Vorname</label>
          <input hlmInput type="text" id="firstName" name="firstName" [(ngModel)]="user.firstname" required />
        </div>
        
        <div class="flex flex-col gap-2">
          <label hlmLabel for="lastName">Nachname</label>
          <input hlmInput type="text" id="lastName" name="lastName" [(ngModel)]="user.lastname" required />
        </div>
        
        <div class="flex flex-col gap-2">
          <label hlmLabel for="email" [class.text-destructive]="loginFailed()">E-Mail</label>
          <input hlmInput type="email" id="email" name="email" [(ngModel)]="user.email" required email 
                 [class.!border-destructive]="loginFailed()" />
          <span *ngIf="loginFailed() && errorMessage()" class="text-sm text-destructive">{{ errorMessage() }}</span>
        </div>
        
        <div class="flex flex-col gap-2">
          <label hlmLabel for="password">Passwort</label>
          <input hlmInput type="password" id="password" name="password" [(ngModel)]="user.password" required minlength="8" />
        </div>
        
        <button hlmBtn type="submit" class="w-full mt-2" [disabled]="f.invalid">Registrieren</button>
      </form>
    </div>
  </section>
</div>
