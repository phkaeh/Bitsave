services:
  postgres:
    image: postgres:18-alpine
    container_name: bitvault-db
    environment:
      POSTGRES_DB: jwt_security
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bitvault-network

  backend:
    build:
      context: ./bitsave-backend
      dockerfile: Dockerfile
    container_name: bitvault-backend
    environment:
      SPRING_JPA_SHOW_SQL: false
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: jdbc:postgresql://postgres:5432/jwt_security
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      BITSAVE_API_KEY: ${BITSAVE_API_KEY}
      JPA_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bitvault-network

  frontend:
    build:
      context: ./bitsave-frontend
      dockerfile: Dockerfile
    container_name: bitvault-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bitvault-network

volumes:
  postgres-data:

networks:
  bitvault-network:
    driver: bridge